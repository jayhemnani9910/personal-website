name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: jayhemnani9910
          outputs: |
            dist/github-snake.svg?color_snake=#3B82F6&color_dots=#1a1b27,#0d4f8b,#1e6cb3,#3b82f6,#60a5fa
            dist/github-snake-dark.svg?color_snake=#60a5fa&color_dots=#1a1b27,#1e3a5f,#2563eb,#3b82f6,#60a5fa

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
